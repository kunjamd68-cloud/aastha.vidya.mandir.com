/* PROFILE CARD */

.profileCard{
background:#151B2E;
margin:20px;
padding:25px;
border-radius:20px;

text-align:center;
}

width:110px;
height:110px;

margin:8px 0;

.tag{

margin-top:10px;
}

.noticeBoard{

border-radius:20px;

}

.noticeBoard h2{

background:#0B1020;
padding:15px;
border-radius:15px;
margin-top:12px;
