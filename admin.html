<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Panel</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#f5f7fa;
padding:30px;
}

.dashboard{
max-width:1200px;
margin:auto;
}

.title{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:40px;
}

.title h1{
color:#0B1F3A;
}

.logout-btn{
padding:12px 25px;
background:#FF9933;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:600;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
margin-bottom:40px;
}

.card{
background:white;
padding:30px;
border-radius:20px;
box-shadow:0 5px 20px rgba(0,0,0,0.08);
}

.card h2{
font-size:2.5rem;
color:#FF9933;
margin-bottom:10px;
}

.card p{
color:#555;
}

.messages{
background:white;
padding:30px;
border-radius:20px;
box-shadow:0 5px 20px rgba(0,0,0,0.08);
}

.messages h2{
margin-bottom:25px;
color:#0B1F3A;
}

.message-box{
background:#f5f7fa;
padding:20px;
border-radius:15px;
margin-bottom:20px;
}

.message-box h3{
color:#0B1F3A;
margin-bottom:10px;
}

.message-box p{
color:#555;
line-height:1.7;
}

</style>

</head>

<body>

<div class="dashboard">

<div class="title">

<h1>
Aastha Vidya Mandir Admin Panel
</h1>

<button class="logout-btn" id="logoutBtn">
Logout
</button>

</div>

<div class="cards">

<div class="card">

<h2 id="messageCount">0</h2>

<p>Total Messages</p>

</div>

<div class="card">

<h2>Admin</h2>

<p>Principal Access</p>

</div>

</div>

<div class="messages" style="margin-bottom:40px;">

<h2>Add Notice</h2>

<input type="text"
id="noticeInput"
placeholder="Write school notice..."
style="
width:100%;
padding:15px;
border:none;
background:#f5f7fa;
border-radius:12px;
margin-bottom:20px;
">

<button id="addNoticeBtn" class="logout-btn">
Add Notice
</button>

</div>

<div class="messages" style="margin-bottom:40px;">

<h2>Admission Applications</h2>

<div id="admissionContainer"></div>

</div>

<div class="card">
<h2 id="admissionCount">0</h2>
<p>Total Admissions</p>
</div>

<div class="messages">

<h2>Contact Messages</h2>

<input
type="text"
id="searchInput"
placeholder="Search messages..."
style="
width:100%;
padding:15px;
margin-bottom:20px;
border:none;
border-radius:12px;
background:#f5f7fa;
">

<div id="messagesContainer"></div>
<hr style="margin:40px 0;">

<h2>Live Chat</h2>

<div id="adminChatMessages"
style="
height:400px;
overflow-y:auto;
background:#f5f7fa;
padding:20px;
border-radius:15px;
margin-bottom:20px;
">
</div>

<input
type="text"
id="adminReply"
placeholder="Type reply..."
style="
width:100%;
padding:15px;
border:none;
border-radius:12px;
background:#f5f7fa;
margin-bottom:15px;
">

<button
id="sendReply"
class="logout-btn">
Send Reply
</button>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
getDocs,
addDoc,
doc,
updateDoc,
deleteDoc,
query,
orderBy,
onSnapshot
}from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import {
getAuth,
signOut,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
apiKey: "AIzaSyCUL7XkQQGiQmYqORGxemvzVx8gmdpNaT8",
authDomain: "aastha-vidya-mandir.firebaseapp.com",
projectId: "aastha-vidya-mandir",
storageBucket: "aastha-vidya-mandir.firebasestorage.app",
messagingSenderId: "1092138801537",
appId: "1:1092138801537:web:c9954a5ccdb9dc845bb080",
measurementId: "G-KL15YPQ3N3"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

/* ========================= AUTH CHECK ========================= */
onAuthStateChanged(auth,(user)=>{
if(!user){
window.location.replace("index.html");
}
});

/* ========================= LOAD MESSAGES ========================= */

const messagesContainer = document.getElementById("messagesContainer");
const messageCount = document.getElementById("messageCount");

async function loadMessages() {

if(!messagesContainer) return;

messagesContainer.innerHTML = "";

const querySnapshot = await getDocs(collection(db, "messages"));

let count = 0;

querySnapshot.forEach((docSnap) => {

count++;

const data = docSnap.data();

messagesContainer.innerHTML += `
<div class="message-box">

<h3>${data.name}</h3>
<p>${data.email}</p>
<p>${data.message}</p>

<button onclick="deleteMessage('${docSnap.id}')"
style="background:red;color:white;border:none;padding:8px 12px;border-radius:8px;cursor:pointer;margin-top:10px;">
Delete
</button>

</div>
`;
});

messageCount.innerText = count;
}

loadMessages();

/* ========================= LOGOUT ========================= */

const logoutBtn = document.getElementById("logoutBtn");

if(logoutBtn){
logoutBtn.addEventListener("click", () => {

signOut(auth)
.then(() => {
window.location.replace("index.html");
})
.catch((error) => {
alert("Logout Error: " + error.message);
});

});
}

/* ========================= ADD NOTICE ========================= */

const addNoticeBtn = document.getElementById("addNoticeBtn");

if(addNoticeBtn){
addNoticeBtn.addEventListener("click", async () => {

const noticeInput = document.getElementById("noticeInput");

if (!noticeInput.value.trim()) {
alert("Write notice first");
return;
}

try {

await addDoc(collection(db, "notices"), {
text: noticeInput.value,
time: new Date()
});

alert("Notice Added Successfully");
noticeInput.value = "";

} catch (error) {
alert("Error: " + error.message);
}

});
}

/* ========================= LOAD ADMISSIONS ========================= */

const admissionContainer = document.getElementById("admissionContainer");
const admissionCount = document.getElementById("admissionCount");

async function loadAdmissions(){

if(!admissionContainer) return;

admissionContainer.innerHTML = "";

const querySnapshot = await getDocs(collection(db,"admissions"));

admissionCount.innerText = querySnapshot.size;

querySnapshot.forEach((docSnap)=>{

const data = docSnap.data();

admissionContainer.innerHTML += `
<div class="message-box">

<h3>${data.studentName}</h3>
<p>Father: ${data.fatherName}</p>
<p>Class: ${data.className}</p>
<p>Mobile: ${data.mobileNumber}</p>
<p>Address: ${data.address}</p>

<p>
<b>Status:</b>
<span style="
padding:5px 10px;
border-radius:8px;
color:white;
background:${data.status === 'approved' ? 'green' : data.status === 'rejected' ? 'red' : 'orange'};
">
${data.status}
</span>
</p>

<button onclick="updateStatus('${docSnap.id}','approved')" class="logout-btn">
Approve
</button>

<button onclick="updateStatus('${docSnap.id}','rejected')" style="background:red;" class="logout-btn">
Reject
</button>

</div>
`;
});

}

loadAdmissions();

/* ========================= UPDATE STATUS ========================= */

window.updateStatus = async function(id, status){

try {

await updateDoc(doc(db,"admissions",id), {
status: status
});

alert("Status Updated Successfully");

loadAdmissions();

} catch (error) {
alert("Error updating status: " + error.message);
}

};

/* ========================= DELETE MESSAGE ========================= */

window.deleteMessage = async function(id){

const confirmDelete = confirm("Are you sure you want to delete this message?");

if(!confirmDelete) return;

try{

await deleteDoc(doc(db,"messages",id));

alert("Message Deleted");

loadMessages();

}catch(error){
alert("Error: " + error.message);
}

};

/* ========================= SEARCH ========================= */

const searchInput = document.getElementById("searchInput");

if(searchInput){
searchInput.addEventListener("input", function(){

const value = this.value.toLowerCase();

const boxes = document.querySelectorAll(".message-box");

boxes.forEach(box => {

const text = box.innerText.toLowerCase();

box.style.display = text.includes(value) ? "block" : "none";

});

});
}

/* =========================
   ADMIN LIVE CHAT
========================= */

const adminChatMessages =
document.getElementById("adminChatMessages");

const adminReply =
document.getElementById("adminReply");

const sendReply =
document.getElementById("sendReply");

/* LOAD CHAT */

const chatQuery = query(
collection(db,"liveChat"),
orderBy("time","asc")
);

onSnapshot(chatQuery,(snapshot)=>{

adminChatMessages.innerHTML="";

snapshot.forEach((doc)=>{

const data = doc.data();

adminChatMessages.innerHTML += `
<div style="
background:${data.sender==="admin"
? "#FF9933"
: "#0B1F3A"};
color:white;
padding:10px;
border-radius:10px;
margin-bottom:10px;
max-width:80%;
${data.sender==="admin"
? "margin-left:auto;"
: ""}
">
${data.message}
</div>
`;

});

adminChatMessages.scrollTop =
adminChatMessages.scrollHeight;

});

/* SEND REPLY */

sendReply.addEventListener("click",
async ()=>{

const text =
adminReply.value.trim();

if(text==="") return;

await addDoc(
collection(db,"liveChat"),
{
message:text,
sender:"admin",
time:new Date()
}
);

adminReply.value="";

});
</script>

</body>
</html>
